<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NWS Warning Alerts</title>
<style>
:root{
  --bg:#050505; --fg:#fff; --line:#2b2b2b; --panel:#111; --panel2:#171717;
  --tor-bg:#7a0000; --tor-accent:#ff4b4b; --tor-confirmed-bg:#c400c9; --tor-confirmed-accent:#ff89ff; --radar-speed: 2.8s;
  --tor-emergency-bg:#ff4cff; --tor-emergency-accent:#ffffff; --svr-bg:#0b3d91; --svr-accent:#63b3ff;
  --svr-considerable-bg:#38a5ab; --svr-considerable-accent:#85edf2; --svr-destructive-bg:#e3dc10; --svr-destructive-accent:#fcf75b;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:var(--bg);
  color:var(--fg);
  font-family:Arial,Helvetica,sans-serif;
  overflow:hidden;
}
body.flash-tor{background:#220000} body.flash-tor-confirmed{background:#310031} body.flash-tor-emergency{background:#4d0f4d}
body.flash-svr{background:#071a3b} body.flash-svr-considerable{background:#173233} body.flash-svr-destructive{background:#363106}

.shell{
  display:grid;
  grid-template-columns:minmax(0,1fr) clamp(380px, 20vw, 460px);
  gap:18px;
  width:100%;
  height:100%;
  padding:8px 18px 6px 18px;
}
.left{
  min-width:0;
  min-height:0;
  display:grid;
  grid-template-rows:auto 1fr;
  gap:4px;
}

.brand{display:flex;align-items:center;gap:14px;color:#ddd}
.brand img{width:56px;height:56px;object-fit:contain;border-radius:50%;background:#fff;padding:2px}
.brand-text .small{font-size:.82rem;color:#cfcfcf;letter-spacing:.08em;text-transform:uppercase;line-height:1.05}
.brand-text .big{font-size:1.15rem;font-weight:800;letter-spacing:.02em;line-height:1.05;margin-top:4px}

.audio-btn.visible{opacity:.82}
.audio-btn:hover{opacity:1;background:rgba(255,255,255,0.16);color:#fff;transform:translateY(-1px)}
.audio-btn.enabled{color:#8fff8f;border-color:#8fff8f}

.right-brand{
  margin-top:0;
  margin-bottom:5px;
  padding-top:0;
  align-items:center;
  justify-content:center;
  text-align:center;
  opacity:.92;
  align-self:center;
  max-width:100%;
  gap:12px;
}

.right-brand .brand-text{
  text-align:center;
}
.right-brand img{width:46px;height:46px}
.right-brand .big{font-size:.94rem}
.right-brand .small{font-size:.70rem}

.niu-brand-mark{
  width:56px !important;
  height:auto !important;
  object-fit:contain;
  border-radius:0 !important;
  background:none !important;
  padding:0 !important;
  flex:0 0 auto;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.35));
}

.idle-logo{
  height:100%;
  width:auto;
  object-fit:contain;
  display:block;
  align-self:center;
  opacity:.95;
}

.idle-logo.nws{
  border-radius:50%;
  background:#fff;
  padding:2px;
}

.idle-logo.niu{
  border-radius:0;
  background:none;
  padding:0;
}

.idle-title{
  font-size:12px;
  color:white;
  font-weight:800;
  letter-spacing:.05em;
  margin:0;
  line-height:1;
}

.content{
  min-height:0;
  height:100%;
  display:grid;
  grid-template-rows:auto auto auto auto auto minmax(0,1fr);
  justify-items:stretch;
  align-content:start;
  gap:2px;
  padding-top:0;
}

.headline{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  min-width:0;
  padding:.08em .30em;
  border-radius:24px;
  font-size:min(6.8vw,112px);
  line-height:1;
  font-weight:900;
  letter-spacing:.08em;
  text-align:center;
  border:6px solid #fff;
  background:#1a1a1a;
  color:#9d9d9d;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.06);
}
.headline.tor{background:var(--tor-bg);box-shadow:0 0 26px rgba(255,75,75,.45)}
.headline.tor-confirmed{background:var(--tor-confirmed-bg);box-shadow:0 0 30px rgba(255,137,255,.55)}
.headline.tor-emergency{background:var(--tor-emergency-bg);border-color:#fff;box-shadow:0 0 34px rgba(255,255,255,.78)}
.headline.svr{background:var(--svr-bg);box-shadow:0 0 26px rgba(255,213,74,.32)}
.headline.svr-considerable{background:var(--svr-considerable-bg);box-shadow:0 0 26px rgba(255,180,90,.38)}
.headline.svr-destructive{background:var(--svr-destructive-bg);box-shadow:0 0 30px rgba(255,217,255,.45)}

body:not(.idle) .headline{
  color:#ffffff;
  text-shadow:0 0 8px rgba(255,255,255,.22);
}

.flash{animation:flashPulse .65s linear infinite}
@keyframes flashPulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.03);opacity:.48}100%{transform:scale(1);opacity:1}}

.utc{
  font-size:.98rem;
  font-weight:700;
  color:#efefef;
  letter-spacing:.03em;
  min-height:1.0em;
  margin-top:-2px;
}

.status-note{
  font-size:.82rem;
  color:#bdbdbd;
  letter-spacing:.05em;
  line-height:1.02;
  min-height:0;
  text-align:center;
}

.tag-row{
  display:flex;
  flex-wrap:wrap;
  gap:3px;
  justify-content:center;
  align-items:center;
  width:100%;
  margin:0;
  text-align:center;
  position:relative;
  z-index:3;
  line-height:1;
}

.tag{
  padding:2px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.16);
  background:#1a1a1a;
  color:#f4f4f4;
  font-size:.84rem;
  font-weight:800;
  letter-spacing:.01em;
  line-height:1.0;
  min-height:0;
}
.tag.preview{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.28)}
.tag.tor-confirmed{background:rgba(196,0,201,.24);border-color:rgba(255,137,255,.55)}
.tag.tor-considerable{background:rgba(255,100,100,.22);border-color:rgba(255,170,170,.58)}
.tag.tor-emergency{background:rgba(255,76,255,.30);border-color:#fff}
.tag.svr-considerable{background:rgba(21,87,192,.32);border-color:rgba(140,200,255,.55)}
.tag.svr-destructive{background:rgba(63,45,168,.30);border-color:rgba(184,178,255,.55)}

.detail{
  padding:6px 16px;
  border-radius:14px;
  background:linear-gradient(180deg, #1c1c1c, #121212);
  border:2px solid rgba(255,215,90,.55);
  font-size:1.00rem;
  line-height:1.12;
  width:fit-content;
  min-width:0;
  max-width:min(100%, 1100px);
  text-align:center;
  margin:0 auto;
  position:relative;
  z-index:3;
  box-shadow:0 0 14px rgba(255,215,90,.25), inset 0 0 6px rgba(255,215,90,.12);
}
.detail.tor{ border-color:#ff4b4b; box-shadow:0 0 16px rgba(255,75,75,.35), inset 0 0 6px rgba(255,75,75,.10); }
.detail.tor-confirmed{ border-color:#ff89ff; box-shadow:0 0 18px rgba(255,137,255,.40), inset 0 0 6px rgba(255,137,255,.10); }
.detail.tor-emergency{ border-color:#ffffff; box-shadow:0 0 20px rgba(255,255,255,.55), inset 0 0 6px rgba(255,255,255,.10); }
.detail.svr{ border-color:#ffd54a; box-shadow:0 0 14px rgba(255,213,74,.30), inset 0 0 6px rgba(255,213,74,.10); }
.detail.svr-considerable{ border-color:#ffb45a; box-shadow:0 0 14px rgba(255,180,90,.32), inset 0 0 6px rgba(255,180,90,.10); }
.detail.svr-destructive{ border-color:#c69cff; box-shadow:0 0 14px rgba(198,156,255,.34), inset 0 0 6px rgba(198,156,255,.10); }


.summary-strip{
  width:100%;
  min-width:0;
  overflow:hidden;
  display:none;
  align-items:center;
  height:34px;
  padding:0 12px;
  border-radius:12px;
  background:linear-gradient(180deg,#151515,#0f0f0f);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);
}

.summary-label{
  flex:0 0 auto;
  margin-right:10px;
  font-size:.72rem;
  font-weight:900;
  letter-spacing:.08em;
  color:#ffcc66;
  text-transform:uppercase;
  white-space:nowrap;
}

.summary-marquee{
  position:relative;
  flex:1 1 auto;
  min-width:0;
  overflow:hidden;
  height:100%;
  display:flex;
  align-items:center;
}

.summary-track{
  display:inline-block;
  white-space:nowrap;
  will-change:transform;
  padding-right:36px;
  transform:translateX(100%);
}

.summary-track.is-animated{
  animation:summaryMarquee var(--summary-duration, 24s) linear infinite;
}

.summary-text{
  font-size:.94rem;
  color:#f0f0f0;
  font-family: Consolas, "courier new", monospace;
  letter-spacing:.01em;
  white-space:nowrap;
}

@keyframes summaryMarquee{
  from{transform:translateX(var(--summary-start, 100%));}
  to{transform:translateX(calc(-1 * var(--summary-distance, 100%)));}
}

.radar-block{
  margin-top:0;
  display:flex;
  flex-direction:column;
  gap:0;
  align-items:center;
  width:100%;
  min-height:0;
  height:100%;
  overflow:hidden;
  position:relative;
  z-index:1;
}

/* groups */
.topbar-left,
.topbar-right{
  display:flex;
  align-items:center;
  gap:6px;
}

/* base icon */
.icon{
  font-size:16px;
  line-height:1;
  opacity:.75;
  transition:all .2s ease;
}

/* glow styles */
.icon.scan{
  color:#9ddcff;
  text-shadow:0 0 6px rgba(120,220,255,.5);
}

.icon.radar{
  color:#8cffb0;
  text-shadow:0 0 6px rgba(120,255,170,.5);
}

.icon.tor{
  color:#ff6b6b;
  text-shadow:0 0 8px rgba(255,80,80,.6);
}

.icon.svr{
  color:#ffd84d;
  text-shadow:0 0 8px rgba(255,220,80,.6);
}

/* subtle animation */
.icon.scan{
  animation:scanPulse 2.2s infinite;
}

.icon.radar{
  animation:scanPulse 2.8s infinite;
}

@keyframes scanPulse{
  0%{opacity:.5; transform:scale(1)}
  50%{opacity:1; transform:scale(1.12)}
  100%{opacity:.5; transform:scale(1)}
}

.map-label{display:none}

.map-wrap{
  position:relative;
  width:100%;
  height:100%;
  min-height:280px;
  max-height:100%;
  overflow:hidden;
  background:#050505;
  border:none;
  box-shadow:none;
  display:flex;
  align-items:center;
  justify-content:center;
}

body.idle .map-wrap{
  height:calc(100vh - 128px);
  min-height:560px;
  max-height:calc(100vh - 10px);
}

body.flash-tor .map-wrap,
body.flash-tor-confirmed .map-wrap,
body.flash-tor-emergency .map-wrap,
body.flash-svr .map-wrap,
body.flash-svr-considerable .map-wrap,
body.flash-svr-destructive .map-wrap{
  height:calc(100vh - 185px);
  min-height:300px;
  max-height:calc(100vh - 20px);
}

#mapCanvas{
  width:100%;
  height:100%;
  display:block;
  background:#000;
  position:absolute;
  inset:0;
  z-index:2;
}

#idleLoop{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center center;
  display:none;
  z-index:1;
  background:#000;
}

body.idle .map-wrap{
  cursor:pointer;
}

.right{
  min-width:0;
  min-height:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}


.history-header{
  flex:0 0 auto;
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:8px;
  margin:4px 0 8px 0;
}

.panel-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:34px;
  height:28px;
  padding:0;
  background:rgba(255,255,255,0.06);
  color:#bdbdbd;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:999px;
  cursor:pointer;
  opacity:.92;
  transition:background .2s ease, color .2s ease, border-color .2s ease, transform .12s ease, opacity .2s ease;
  white-space:nowrap;
  font-size:15px;
  line-height:1;
}

.banner-icon{
  flex:0 0 auto;
  line-height:1;
}

.banner-main{
  flex:0 1 auto;
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
}

.panel-btn:hover{
  opacity:1;
  background:rgba(255,255,255,0.16);
  color:#fff;
  transform:translateY(-1px);
}

.panel-btn.enabled{
  color:#8fff8f;
  border-color:#8fff8f;
}

.history-expires.expires-active{
  color:#39d353;   /* green */
}

.history-expires.expires-expired{
  color:#ff5c5c;   /* red */
}

.history-times{
  margin-top:2px;
  display:flex;
  flex-direction:column;
  gap:1px;
}

.history-issued,
.history-expires{
  font-size:.70rem;
  line-height:1.1;
  color:#bdbdbd;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.history-issued{
  color:#cfcfcf;
}

.idle-scan-icon.radar.left{
  display:inline-block;
  transform:scaleX(-1);
}

.history-expires{
  color:#9aa3ff;   /* subtle blue */
}

.history-title{
  flex:0 0 auto;
  font-weight: bold;
  color:#bdbdbd;
  font-size:.74rem;
  text-transform:uppercase;
  letter-spacing:0.06em;
  margin:4px 0 8px 0;
  text-align:center;
}

.history-column{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow-y:auto;
  overflow-x:hidden;
  padding-right:4px;
  align-items:stretch;
}

.history-card{
  background:#121212;
  border:1px solid #2c2c2c;
  border-top:4px solid #555;
  border-radius:16px;
  padding:10px 12px 11px;
  min-width:0;
  overflow:hidden;
  cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  flex:0 0 auto;   /* critical: do not shrink */
}

.history-head{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:6px;
}

.history-status{
  flex:0 0 auto;
  width:12px;
  height:12px;
  border-radius:50%;
  margin-left:auto;
  align-self:flex-start;
  box-shadow:0 0 0 1px rgba(255,255,255,.18) inset, 0 0 8px rgba(0,0,0,.35);
}

.history-status.active{
  background:#39d353;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.18) inset,
    0 0 10px rgba(57,211,83,.55);
}

.history-status.expired{
  background:#ff5c5c;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.18) inset,
    0 0 10px rgba(255,92,92,.45);
}

.history-card:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.28)}
.history-card.active{box-shadow:0 0 0 2px rgba(255,255,255,.16) inset}
.history-card.tor{border-top-color:var(--tor-accent)}
.history-card.tor-confirmed{border-top-color:var(--tor-confirmed-accent);background:rgba(196,0,201,.10)}
.history-card.tor-emergency{border-top-color:#fff;background:rgba(255,76,255,.14)}
.history-card.svr{border-top-color:var(--svr-accent)}
.history-card.svr-considerable{border-top-color:var(--svr-considerable-accent);background:rgba(21,87,192,.14)}
.history-card.svr-destructive{border-top-color:var(--svr-destructive-accent);background:rgba(63,45,168,.14)}
.history-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.icon-pill{flex:0 0 auto;min-width:48px;text-align:center;padding:6px 8px;border-radius:999px;font-size:.82rem;font-weight:900;letter-spacing:.08em;color:#fff;background:#333}
.history-card.tor .icon-pill{background:var(--tor-bg)}
.history-card.tor-confirmed .icon-pill{background:var(--tor-confirmed-bg)}
.history-card.tor-emergency .icon-pill{background:var(--tor-emergency-bg)}
.history-card.svr .icon-pill{background:var(--svr-bg)}
.history-card.svr-considerable .icon-pill{background:var(--svr-considerable-bg)}
.history-card.svr-destructive .icon-pill{background:var(--svr-destructive-bg)}
.history-office{font-size:.98rem;font-weight:900;line-height:1}
.history-office-name{font-size:.72rem;font-weight:600;color:#9d9d9d;margin-left:6px;opacity:.88}
.history-time{margin-top:2px;font-size:.74rem;color:#bdbdbd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-tags{font-size:.73rem;color:#ededed;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.history-hazard{
  margin-top:8px;
  font-size:.84rem;
  line-height:1.25;
  color:#f0f0f0;
  display:-webkit-box;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.history-source{
  margin-top:2px;
  font-size:.70rem;
  color:#949494;
  line-height:1.1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.warning-banner{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:100%;
  text-align:center;
}
.warning-banner-text{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:.18em;
  width:100%;
  min-width:0;
  white-space:nowrap;
  flex-wrap:nowrap;
  overflow:hidden;
  text-overflow:clip;
}

.warning-banner-time{
  display:block;
  margin-top:.08em;
  font-family:Arial, Helvetica, sans-serif;
  font-size:.14em;
  font-weight:700;
  line-height:1.0;
  letter-spacing:0 !important;
  word-spacing:0 !important;
  white-space:nowrap;
  opacity:.96;
}

.idle-banner{
  display:flex;
  align-items:center;            /* vertical centering */
  justify-content:center;
  gap:10px;
  width:100%;
  padding:0;                     /* remove extra height */
  height:56px;                   /* fixed compact height */
  line-height:1;
}

.idle-banner-center{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;                         /* tighter */
  height:100%;
}

.countdown-badge{
  position:absolute;
  left:12px;
  bottom:12px;
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:6;
  pointer-events:none;
}

.countdown-ring{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  transform:rotate(-90deg);
}

.countdown-ring-bg{
  fill:rgba(0,0,0,.35);
  stroke:rgba(255,255,255,.18);
  stroke-width:4;
}

.countdown-ring-progress{
  fill:none;
  stroke:#ffffff;
  stroke-width:4;
  stroke-linecap:round;
  stroke-dasharray:100.53;
  stroke-dashoffset:0;
  filter:drop-shadow(0 0 4px rgba(255,255,255,.35));
}

.countdown-number{
  position:relative;
  z-index:1;
  font-size:14px;
  font-weight:900;
  line-height:1;
  color:#fff;
  text-shadow:0 0 6px rgba(0,0,0,.65);
}

body.idle #countdownBadge{
  display:none !important;
}

.idle-time-line{
  display:block;
  font-family:Arial, Helvetica, sans-serif;
  font-size:48%;
  font-weight:600;
  line-height:1.0;
  letter-spacing:0 !important;
  word-spacing:0 !important;
  white-space:nowrap;
  text-align:center;
  font-kerning:normal;
  text-rendering:optimizeLegibility;
}
.idle-scan-line{
  display:block;
  margin-top:2px;
  font-family:"Segoe UI", Arial, sans-serif;
  font-size:18px;
  font-weight:800;
  letter-spacing:.14em;
  text-transform:uppercase;
  text-align:center;
  color:#de1818;
  text-shadow:0 0 6px rgba(120,220,255,.35);
  animation:scanSync var(--radar-speed) linear infinite;
}

@keyframes scanPulse{
  0%   { opacity:.55; letter-spacing:.08em; text-shadow:0 0 4px rgba(120,220,255,.2); }
  50%  { opacity:1;   letter-spacing:.16em; text-shadow:0 0 12px rgba(120,220,255,.6); }
  100% { opacity:.55; letter-spacing:.08em; text-shadow:0 0 4px rgba(120,220,255,.2); }
}

.radar-sweep{
  position:relative;
  width:54px;
  height:54px;
  align-self:center;
  border-radius:50%;
  border:1px solid rgba(90,255,140,.34);
  background:
    radial-gradient(circle at center, rgba(255,60,60,.95) 0 5%, transparent 6% 100%),
    radial-gradient(circle at center,
      transparent 0 43%,
      rgba(80,255,140,.16) 44% 46%,
      transparent 47% 69%,
      rgba(80,255,140,.12) 70% 72%,
      transparent 73% 100%);
  box-shadow:
    0 0 12px rgba(80,255,140,.18),
    inset 0 0 10px rgba(80,255,140,.10);
  flex:0 0 auto;
  overflow:hidden;
}

.radar-sweep::before{
  content:"";

function parseSpcIssuedLineToUtcText(raw){
  const lines = String(raw || '').split(/\r?\n/);

  let officeLineIndex = -1;
  for(let i = 0; i < lines.length; i++){
    if(lines[i].trim() === 'NWS Storm Prediction Center Norman OK'){
      officeLineIndex = i;
      break;
    }
  }

  if(officeLineIndex < 0 || officeLineIndex + 1 >= lines.length) return '';

  const issuedLine = lines[officeLineIndex + 1].trim();
  if(!issuedLine) return '';

  // Example:
  // 1052 AM CDT Mon Apr 20 2026
  const m = issuedLine.match(
    /^(\d{1,4})\s+(AM|PM)\s+(CDT|CST|EDT|EST|MDT|MST|PDT|PST)\s+\w{3}\s+(\w{3})\s+(\d{1,2})\s+(\d{4})$/i
  );
  if(!m) return '';

  const rawTime = m[1];
  const ampm = m[2].toUpperCase();
  const tzAbbr = m[3].toUpperCase();
  const monthStr = m[4];
  const day = Number(m[5]);
  const year = Number(m[6]);

  let hour = 0;
  let minute = 0;

  if(rawTime.length <= 2){
    hour = Number(rawTime);
    minute = 0;
  } else if(rawTime.length === 3){
    hour = Number(rawTime.slice(0, 1));
    minute = Number(rawTime.slice(1));
  } else {
    hour = Number(rawTime.slice(0, rawTime.length - 2));
    minute = Number(rawTime.slice(-2));
  }

  if(ampm === 'AM' && hour === 12) hour = 0;
  if(ampm === 'PM' && hour !== 12) hour += 12;

  const monthMap = {
    JAN:0, FEB:1, MAR:2, APR:3, MAY:4, JUN:5,
    JUL:6, AUG:7, SEP:8, OCT:9, NOV:10, DEC:11
  };
  const month = monthMap[monthStr.toUpperCase()];
  if(month === undefined) return '';

  const tzOffsets = {
    EDT: -4, EST: -5,
    CDT: -5, CST: -6,
    MDT: -6, MST: -7,
    PDT: -7, PST: -8
  };
  const offsetHours = tzOffsets[tzAbbr];
  if(offsetHours === undefined) return '';

  // local time -> UTC
  const utcMillis = Date.UTC(year, month, day, hour - offsetHours, minute, 0);
  const d = new Date(utcMillis);

  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dd = String(d.getUTCDate()).padStart(2, '0');
  const hh = String(d.getUTCHours()).padStart(2, '0');
  const mm = String(d.getUTCMinutes()).padStart(2, '0');

  return `${hh}${mm} UTC ${dd} ${months[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
}

function extractSpcSummary(raw){
  const lines = String(raw || '').split(/\r?\n/);
  let inSummary = false;
  const collected = [];

  for(const line of lines){
    const trimmed = line.trim();
    if(!inSummary){
      if(trimmed.toUpperCase() === '...SUMMARY...'){
        inSummary = true;
      }
      continue;
    }

    if(trimmed.startsWith('...') && trimmed.toUpperCase() !== '...SUMMARY...') break;
    if(!trimmed){
      if(collected.length) break;
      continue;
    }
    collected.push(trimmed);
  }

  return collected.join(' ');
}

async function fetchLatestSummaryData(){
  for(const file of SPC_SUMMARY_FILES){
    try{
      const res = await fetch(file + '?ts=' + Date.now(), {cache:'no-store'});
      if(!res.ok) continue;

      const raw = await res.text();
      const summary = extractSpcSummary(raw);
      const issuedUtcText = parseSpcIssuedLineToUtcText(raw);

      if(summary){
        return {
          summary,
          issuedUtcText
        };
      }
    } catch(err){
      console.debug('summary fetch failed for', file, err);
    }
  }

  return {
    summary: '',
    issuedUtcText: ''
  };
}

function parseUtcString(s){
  if(!s) return null;
  const iso = String(s).replace(' UTC', 'Z').replace(' ', 'T');
  const d = new Date(iso);
  return Number.isNaN(d.getTime()) ? null : d;
}

function isAlertCurrentlyValid(alert){
  const validTo = parseUtcString(alert.valid_to || alert.expires || '');
  if(!validTo) return false;
  return Date.now() <= validTo.getTime();
}

function applySummaryData(data){
  latestSummaryText = (data && data.summary) ? data.summary : '';
  latestSummaryIssuedUtcText = (data && data.issuedUtcText) ? data.issuedUtcText : '';

  const prefix = latestSummaryIssuedUtcText
    ? `Issued ${latestSummaryIssuedUtcText} • `
    : '';

  summaryTextEl.textContent = prefix + (latestSummaryText || '').toUpperCase();

  summaryStripEl.classList.toggle('has-summary', !!latestSummaryText);
  updateSummaryVisibility();
  measureSummaryMarquee();
}

function updateSummaryVisibility(){
  const show = state.mode === 'idle' && !!latestSummaryText;
  summaryStripEl.style.display = show ? 'flex' : 'none';
}

function measureSummaryMarquee(){
  summaryTrackEl.classList.remove('is-animated');
  if(!latestSummaryText || summaryStripEl.style.display === 'none') return;

  const containerWidth = Math.max(1, summaryMarqueeEl.clientWidth);
  const textWidth = Math.max(1, summaryTrackEl.scrollWidth);
  const duration = Math.max(14, (containerWidth + textWidth) / 80);

  summaryTrackEl.style.setProperty('--summary-start', containerWidth + 'px');
  summaryTrackEl.style.setProperty('--summary-distance', textWidth + 'px');
  summaryTrackEl.style.setProperty('--summary-duration', duration + 's');

  void summaryTrackEl.offsetWidth;
  summaryTrackEl.classList.add('is-animated');
}

async function refreshSummary(){
  const data = await fetchLatestSummaryData();
  applySummaryData(data);
}
function resizeCanvasToDisplaySize(){
  const rect = mapCanvas.getBoundingClientRect();
  const w = Math.max(1, Math.round(rect.width));
  const h = Math.max(1, Math.round(rect.height));
  if (mapCanvas.width !== w || mapCanvas.height !== h) {
    mapCanvas.width = w;
    mapCanvas.height = h;
  }
}

async function ensureAudioReady() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  try {
    if (audioCtx.state === 'suspended') {
      await audioCtx.resume();
    }
    audioUnlocked = (audioCtx.state === 'running');
  } catch (err) {
    console.error('audio resume failed', err);
  }

  return audioUnlocked;
}

function getNextIdleLoopRefreshTime(fromDate = new Date()){
  const d = new Date(fromDate.getTime());
  d.setSeconds(0, 0);

  const minute = d.getMinutes();
  const hour = d.getHours();
  const refreshMinutes = [2, 14, 26, 38, 50];

  for (const m of refreshMinutes) {
    const candidate = new Date(d.getTime());
    candidate.setMinutes(m, IDLE_LOOP_REFRESH_DELAY_SEC, 0);
    if (candidate > fromDate) return candidate;
  }

  const nextHour = new Date(d.getTime());
  nextHour.setHours(hour + 1, 2, IDLE_LOOP_REFRESH_DELAY_SEC, 0);
  return nextHour;
}

function stopCountdown(){
  clearInterval(countdownTimer);
  countdownTimer = null;
  countdownEndTs = 0;
  countdownDurationMs = 0;
  countdownBadgeEl.style.display = 'none';
}

function updateCountdownVisual(){
  if (!countdownEndTs || !countdownDurationMs) return;

  const remainingMs = Math.max(0, countdownEndTs - Date.now());
  const remainingSec = Math.ceil(remainingMs / 1000);
  const progress = remainingMs / countdownDurationMs;

  const circumference = 2 * Math.PI * 16; // r=16
  const dashOffset = circumference * (1 - progress);

  countdownNumberEl.textContent = remainingSec;
  countdownRingProgressEl.style.strokeDasharray = `${circumference}`;
  countdownRingProgressEl.style.strokeDashoffset = `${dashOffset}`;

  if (remainingMs <= 0) {
    stopCountdown();
  }
}

function startCountdown(durationMs){
  clearInterval(countdownTimer);
  countdownDurationMs = durationMs;
  countdownEndTs = Date.now() + durationMs;
  countdownBadgeEl.style.display = 'flex';
  updateCountdownVisual();
  countdownTimer = setInterval(updateCountdownVisual, 200);
}

function getHistorySignature(alerts){
  return alerts
    .slice(-MAX_HISTORY)
    .map(a => alertKey(a))
    .join('||');
}

function scheduleIdleLoopRefresh(){
  clearTimeout(idleRefreshTimer);

  if (state.mode !== 'idle') return;

  const now = new Date();
  const nextRefresh = getNextIdleLoopRefreshTime(now);
  const delay = Math.max(1000, nextRefresh.getTime() - now.getTime());

  idleRefreshTimer = setTimeout(() => {
    if (state.mode === 'idle') {
      renderIdleImage();
      scheduleIdleLoopRefresh();
    }
  }, delay);
}

function playEnableBeep(){
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = 'sine';
  osc.frequency.setValueAtTime(880, now);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.08, now + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.2);
}

function escapeHtml(s){
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function alertKey(a){
  return [a.issued || '', a.type || '', a.wfo || '', a.etn || '', a.hazard_text || ''].join('|');
}
function getSeverityClass(a){
  if(!a) return '';
  const type=(a.type || '').toUpperCase();
  const torThreat=(a.tornado_damage_threat || '').toUpperCase();
  const svrThreat=(a.thunderstorm_damage_threat || '').toUpperCase();
  const emergency=!!a.emergency || torThreat === 'CATASTROPHIC';
  const confirmed=!!a.confirmed_tornado || (a.tornado_tag || '').toUpperCase() === 'OBSERVED' || torThreat === 'CONSIDERABLE';
  if(type === 'TOR'){ if(emergency) return 'tor-emergency'; if(confirmed) return 'tor-confirmed'; return 'tor'; }
  if(type === 'SVR'){ if(svrThreat === 'DESTRUCTIVE') return 'svr-destructive'; if(svrThreat === 'CONSIDERABLE') return 'svr-considerable'; return 'svr'; }
  return '';
}
function getFlashClass(a){ const sev=getSeverityClass(a); return sev ? 'flash-' + sev : ''; }
function buildTags(a){
  const tags=[];
  const sev=getSeverityClass(a);
  const tornadoThreat=(a.tornado_damage_threat || '').toUpperCase();

  if(sev==='tor-confirmed') tags.push({label:'Confirmed Tornado', cls:'tor-confirmed'});
  if(tornadoThreat==='CONSIDERABLE') tags.push({label:'Damage Threat: Considerable', cls:'tor-considerable'});
  if(sev==='tor-emergency' || tornadoThreat==='CATASTROPHIC') tags.push({label:'Tornado Emergency', cls:'tor-emergency'});
  if((a.thunderstorm_damage_threat || '').toUpperCase()==='CONSIDERABLE') tags.push({label:'Damage Threat: Considerable', cls:'svr-considerable'});
  if((a.thunderstorm_damage_threat || '').toUpperCase()==='DESTRUCTIVE') tags.push({label:'Damage Threat: Destructive', cls:'svr-destructive'});
  return tags;
}

function formatUtcBannerTimeFromDate(d){
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const day = days[d.getUTCDay()];
  const date = String(d.getUTCDate()).padStart(2,'0');
  const month = months[d.getUTCMonth()];
  const year = d.getUTCFullYear();
  const hh = String(d.getUTCHours()).padStart(2,'0');
  const mm = String(d.getUTCMinutes()).padStart(2,'0');
  const ss = String(d.getUTCSeconds()).padStart(2,'0');
  return `${day} ${date} ${month} ${year} ${hh}:${mm}:${ss} UTC`;
}
function formatWarningIssuedText(s){
  if(!s) return '';
  const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2}) UTC$/);
  if(!m) return s;
  const d = new Date(Date.UTC(
    Number(m[1]), Number(m[2]) - 1, Number(m[3]),
    Number(m[4]), Number(m[5]), Number(m[6])
  ));
  return formatUtcBannerTimeFromDate(d);
}
function formatUtcBannerTime(){
  return formatUtcBannerTimeFromDate(new Date());
}
function updateIdleClock(){
  if(state.mode !== 'idle') return;
  idleTimeLineEl.textContent = formatUtcBannerTime();
}

function startExpiryTimer(expectedKey){
  const duration = (state.mode === 'preview')
    ? PREVIEW_DISPLAY_MS
    : MAX_DISPLAY_MS;

  startCountdown(duration);

  state.expiryTimer = setTimeout(() => {
    if(!state.alert || alertKey(state.alert) !== expectedKey) return;

    if(state.mode === 'preview'){
      if(liveQueue.length) activateLive(liveQueue.shift(), true);
      else setIdle();
      return;
    }

    if(state.mode === 'live'){
      if(liveQueue.length) activateLive(liveQueue.shift(), true);
      else setIdle();
    }
  }, duration);
}
function activateLive(alert, playAudio=true){
  clearTimers();
  state.mode = 'live';
  state.alert = alert;
  state.startedAt = Date.now();
  renderAlert(alert);
  if(playAudio) playTone(alert);
  startExpiryTimer(alertKey(alert));
}
function activatePreview(alert){
  clearTimers();
  state.mode = 'preview';
  state.alert = alert;
  state.startedAt = Date.now();
  renderAlert(alert);
  startExpiryTimer(alertKey(alert));
}

function maybeInterruptForLive(){
  if(!liveQueue.length) return;
  if(state.mode === 'idle'){
    activateLive(liveQueue.shift(), true);
    return;
  }
  const elapsed = Date.now() - state.startedAt;
  if(elapsed >= MIN_DISPLAY_MS){
    activateLive(liveQueue.shift(), true);
  } else if(!state.preemptTimer) {
    state.preemptTimer = setTimeout(() => {
      state.preemptTimer = null;
      if(liveQueue.length){
        activateLive(liveQueue.shift(), true);
      }
    }, MIN_DISPLAY_MS - elapsed);
  }
}
function updateActiveTile(){
  const activeKey = state.mode === 'preview' && state.alert ? alertKey(state.alert) : '';
  document.querySelectorAll('.history-card').forEach(el => {
    el.classList.toggle('active', !!activeKey && el.dataset.key === activeKey);
  });
}
function renderHistory(alerts){
  const historyItems = alerts.slice(-MAX_HISTORY).reverse();
  const signature = getHistorySignature(alerts);

  const isNewData = signature !== lastRenderedHistorySignature;
  const keepAtTop = isNewData || historyUserPinnedToTop || historyListEl.scrollTop <= 2;
  const previousScrollTop = historyListEl.scrollTop;

  lastRenderedHistorySignature = signature;

  if(!historyItems.length){
    historyListEl.innerHTML = '<div style="color:#888;padding:10px 4px;">No warnings yet.</div>';
    historyListEl.scrollTop = 0;
    historyUserPinnedToTop = true;
    return;
  }

  historyListEl.innerHTML = historyItems.map(a => {
    const cls = getSeverityClass(a);
    const tags = buildTags(a).map(t => t.label).join(' • ');
    const key = alertKey(a);
    const isValid = isAlertCurrentlyValid(a);
    const expiresClass = isValid ? 'expires-active' : 'expires-expired';
    const statusCls = isValid ? 'active' : 'expired';
    const statusTitle = isValid ? 'Currently valid' : 'Expired';
    const type = (a.type || '').toUpperCase().trim();

    let icon = '';
    if (type === 'TOR') icon = '🌪️';
    else if (type === 'SVR') icon = '⚡';

    const pillLabel = icon ? `${type}${icon}` : type;
    return `<div class="history-card ${cls}" data-key="${escapeHtml(key)}">
      <div class="history-head">
        <div class="icon-pill">${escapeHtml(pillLabel)}</div>
        <div style="min-width:0; flex:1 1 auto;">
          <div class="history-office">
            ${escapeHtml(a.wfo || '')}
            ${a.office_name ? `<span class="history-office-name">${escapeHtml(a.office_name)}</span>` : ''}
          </div>

          <div class="history-times">
  <div class="history-issued">
    Issued: ${escapeHtml(a.issued || '')}
  </div>
  ${a.valid_to ? `
    <div class="history-expires ${expiresClass}">
      Expires: ${escapeHtml(a.valid_to)}
    </div>
  ` : ''}
</div>

          ${a.source_text ? `<div class="history-source">Source: ${escapeHtml(a.source_text)}</div>` : ''}
        </div>

        <div class="history-status ${statusCls}" title="${statusTitle}" aria-label="${statusTitle}"></div>
      </div>

      ${tags ? `<div class="history-tags">${escapeHtml(tags)}</div>` : ''}
      ${a.hazard_text ? `<div class="history-hazard">${escapeHtml(a.hazard_text)}</div>` : ''}
    </div>`;
  }).join('');

  historyListEl.querySelectorAll('.history-card').forEach(card => {
    card.addEventListener('click', () => {
      const found = lastAlerts.find(a => alertKey(a) === card.dataset.key);
      if(found) activatePreview(found);
    });
  });

  if (keepAtTop) {
    historyListEl.scrollTop = 0;
    historyUserPinnedToTop = true;
  } else {
    historyListEl.scrollTop = previousScrollTop;
  }

  updateActiveTile();
}


function playFallbackTone(sev){
  if(!audioEnabled || !audioCtx) return;

  const now = audioCtx.currentTime;

  function makeMaster(endTime, peak){
    const master = audioCtx.createGain();
    master.gain.setValueAtTime(0.0001, now);
    master.gain.exponentialRampToValueAtTime(peak, now + 0.03);
    master.gain.exponentialRampToValueAtTime(0.0001, endTime);
    master.connect(audioCtx.destination);
    return master;
  }

  function dualTone(master, freq1, freq2, type, start, end, detune){
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();

    osc1.type = type || 'square';
    osc2.type = type || 'square';

    osc1.frequency.value = freq1;
    osc2.frequency.value = freq2;
    osc2.detune.value = detune || 0;

    osc1.connect(master);
    osc2.connect(master);

    osc1.start(start);
    osc2.start(start);
    osc1.stop(end);
    osc2.stop(end);
  }

  function modulate(master, freqA, freqB, speed, start, end){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();

    osc.type = 'sine';
    osc.frequency.value = freqA;

    lfo.type = 'sine';
    lfo.frequency.value = speed;
    lfoGain.gain.value = freqB - freqA;

    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);

    gain.gain.value = 0.55;

    osc.connect(gain);
    gain.connect(master);

    osc.start(start);
    lfo.start(start);
    osc.stop(end);
    lfo.stop(end);
  }

  function longBeep(start, duration, f1, f2, amp){
    const master = audioCtx.createGain();
    master.gain.setValueAtTime(0.0001, start);
    master.gain.exponentialRampToValueAtTime(amp, start + 0.02);
    master.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    master.connect(audioCtx.destination);

    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();

    osc1.type = 'sine';
    osc2.type = 'triangle';

    osc1.frequency.value = f1;
    osc2.frequency.value = f2;

    osc1.connect(master);
    osc2.connect(master);

    osc1.start(start);
    osc2.start(start);
    osc1.stop(start + duration + 0.05);
    osc2.stop(start + duration + 0.05);
  }

  if (sev === 'svr' || sev === 'svr-considerable' || sev === 'svr-destructive') {
    longBeep(now + 0.00, 0.50, 850, 1100, 0.12);
    longBeep(now + 0.65, 0.50, 850, 1100, 0.12);
    longBeep(now + 1.30, 0.60, 850, 1100, 0.13);
    return;
  }

  if (sev === 'tor') {
    const end = now + 5.5;
    const master = makeMaster(end, 0.23);
    dualTone(master, 850, 960, 'square', now, end, 5);
    return;
  }

  if (sev === 'tor-confirmed') {
    const end = now + 5.5;
    const master = makeMaster(end, 0.26);
    dualTone(master, 900, 1100, 'square', now, end, 10);
    modulate(master, 850, 1200, 1.2, now, end);
    return;
  }

  if (sev === 'tor-emergency') {
    const end = now + 6.0;
    const master = makeMaster(end, 0.30);
    dualTone(master, 950, 1400, 'square', now, end, 15);
    dualTone(master, 600, 720, 'sawtooth', now, end, -10);
    modulate(master, 700, 1600, 2.5, now, end);
    return;
  }

  longBeep(now + 0.00, 0.22, 700, 900, 0.08);
}

async function playTone(alert){
  if(!audioEnabled || !alert) return;

  await ensureAudioReady();
  if(!audioCtx || audioCtx.state !== 'running') return;

  const sev = getSeverityClass(alert);

  const config = {
    severity: sev,
    type: String(alert.type || '').toUpperCase(),
    enabled: audioEnabled,
    now: audioCtx.currentTime
  };

  if (window.AlertToneLab && typeof window.AlertToneLab.play === 'function') {
    try {
      window.AlertToneLab.play(audioCtx, config);
      return;
    } catch (e) {
      console.error("ToneLab failed, falling back:", e);
    }
  }

  console.log("Fallback tone used:", sev);
  playFallbackTone(sev);
}

function seedKnownKeys(alerts){ knownKeys = new Set(alerts.map(alertKey)); }
function enqueueNewAlerts(alerts){
  for(const a of alerts){
    const key = alertKey(a);
    if(!knownKeys.has(key)){
      knownKeys.add(key);
      liveQueue.push(a);
    }
  }
  maybeInterruptForLive();
}
async function pollAlerts(){
  try{
    const res=await fetch(ALERTS_URL + '?ts=' + Date.now(), {cache:'no-store'});
    const alerts=await res.json();
    if(Array.isArray(alerts)){
      lastAlerts = alerts;
      renderHistory(alerts);
      if(!initialSeeded){
        seedKnownKeys(alerts);
        initialSeeded = true;
        setIdle();
      } else {
        enqueueNewAlerts(alerts);
      }
    }
  } catch(err){
    console.error('poll failed', err);
  }
}

function lonLatToPixel(lon, lat){
  return { x:(lon - (-126.0))/0.005, y:(50.0 - lat)/0.005 };
}
function shiftPointToCrop(p, crop){
  return {
    x:(p.x - Number(crop.sx || 0))*(mapCanvas.width/Number(crop.sw || MAP_SIZE)),
    y:(p.y - Number(crop.sy || 0))*(mapCanvas.height/Number(crop.sh || MAP_SIZE))
  };
}

function getCSSVar(name){
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function hexToRgba(hex, alpha){
  let h = String(hex || '').replace('#', '').trim();
  if (h.length === 3) {
    h = h.split('').map(ch => ch + ch).join('');
  }
  if (h.length !== 6) return `rgba(255,255,255,${alpha})`;

  const r = parseInt(h.slice(0,2), 16);
  const g = parseInt(h.slice(2,4), 16);
  const b = parseInt(h.slice(4,6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

  const styles = {
    'tor': {
      stroke: getCSSVar('--tor-accent'),
      fillAlpha: 0.14,
      lineWidth: 4,
      shadowBlur: 12,
      pointRadius: 3.5
    },
    'tor-confirmed': {
      stroke: getCSSVar('--tor-confirmed-accent'),
      fillAlpha: 0.14,
      lineWidth: 4,
      shadowBlur: 12,
      pointRadius: 3.5
    },

      stroke: getCSSVar('--tor-emergency-accent'),
      fillAlpha: 0.14,
      lineWidth: 5,
      shadowBlur: 12,
      pointRadius: 3.5
    },
    'svr': {
      stroke: getCSSVar('--svr-accent'),
      fillAlpha: 0.12,
      lineWidth: 4,
      shadowBlur: 10,
      pointRadius: 3.5
    },
    'svr-considerable': {
      stroke: getCSSVar('--svr-considerable-accent'),
      fillAlpha: 0.12,
      lineWidth: 4,
      shadowBlur: 12,
      pointRadius: 3.5
    },
    'svr-destructive': {
      stroke: getCSSVar('--svr-destructive-accent'),
      fillAlpha: 0.18,
      lineWidth: 5,
      shadowBlur: 15,
      pointRadius: 4
    }
  };

  return styles[sev] || {
    stroke: '#ffffff',
    fillAlpha: 0.12,
    lineWidth: 4,
    shadowBlur: 10,
    pointRadius: 3.5
  };
}

function drawPolygon(ctx, pts, sev){
  if(!pts || pts.length < 2) return;

  const style = getPolygonStyle(sev);
  const stroke = style.stroke;
  const fill = hexToRgba(stroke, style.fillAlpha);

  ctx.save();

  ctx.setLineDash([]);

  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for(let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  if(pts.length >= 3) ctx.closePath();

  ctx.fillStyle = fill;
  ctx.strokeStyle = stroke;
  ctx.lineWidth = style.lineWidth;
  ctx.shadowColor = stroke;
  ctx.shadowBlur = style.shadowBlur;

  if(pts.length >= 3) ctx.fill();
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.setLineDash([]);

  ctx.fillStyle = stroke;
  for (const p of pts){
    ctx.beginPath();
    ctx.arc(p.x, p.y, style.pointRadius, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}
function loadSnapshot(path){
  return new Promise((resolve,reject) => {
    if(!path){ reject(new Error('no radar image')); return; }
    const img=new Image();
    img.onload=() => resolve(img);
    img.onerror=reject;
    img.src=path + (path.includes('?') ? '&' : '?') + 'ts=' + Date.now();
  });
}
async function drawMap(alert){
  resizeCanvasToDisplaySize();
  idleLoopEl.style.display = 'none';
  mapCanvas.style.display = 'block';
  clearMap();
  if(!alert || !alert.radar_image || !alert.radar_crop || !alert.polygon || !alert.polygon.length || !alert.centroid){
    return;
  }
  const token = ++mapToken;
  try{
    const img = await loadSnapshot(alert.radar_image);
    if(token !== mapToken) return;
    mapCtx.clearRect(0,0,mapCanvas.width,mapCanvas.height);

    const crop = alert.radar_crop;
    mapCtx.drawImage(img, 0, 0, mapCanvas.width, mapCanvas.height);

    const polygonPx = alert.polygon.map(pt => lonLatToPixel(Number(pt[0]), Number(pt[1])));
    const shiftedPoly = polygonPx.map(p => shiftPointToCrop(p, crop));

    drawPolygon(mapCtx, shiftedPoly, getSeverityClass(alert));
  } catch(err){
    if(token !== mapToken) return;
    console.error('snapshot draw failed', err);
    clearMap();
  }
}

setInterval(pollAlerts, POLL_MS);
setInterval(updateIdleClock, 1000);
summaryRefreshTimer = setInterval(refreshSummary, SUMMARY_REFRESH_MS);
refreshSummary();
pollAlerts();
setIdle();
updateIdleClock();
</script>
